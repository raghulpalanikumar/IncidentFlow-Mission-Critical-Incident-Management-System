version: '3.8'

services:
  backend:
    build: ./Backend
    container_name: ims-backend
    environment:
      NODE_ENV: production
      PORT: 8080
      RABBITMQ_URL: amqp://rabbitmq
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_HOST: postgres
      POSTGRES_DB: ims
      MONGODB_URL: mongodb://mongodb:27017/ims
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
    ports:
      - "8081:8080"
    depends_on:
      - postgres
      - mongodb
      - redis
      - rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ims-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  worker:
    build: ./Backend
    container_name: ims-worker
    command: node worker.js
    environment:
      NODE_ENV: production
      RABBITMQ_URL: amqp://rabbitmq
      MONGODB_URL: mongodb://mongodb:27017/ims
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
    depends_on:
      - rabbitmq
      - postgres
      - redis
      - mongodb
    restart: unless-stopped
    networks:
      - ims-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  frontend:
    build: ./frontend
    container_name: ims-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8081
    restart: unless-stopped
    networks:
      - ims-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  postgres:
    image: postgres:15-alpine
    container_name: ims-postgres
    environment:
      POSTGRES_DB: ims
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    command:
      [
        "postgres",
        "-c",
        "max_connections=100",
        "-c",
        "shared_buffers=256MB",
        "-c",
        "effective_cache_size=1GB",
        "-c",
        "maintenance_work_mem=64MB",
        "-c",
        "checkpoint_completion_target=0.9",
        "-c",
        "wal_buffers=16MB",
        "-c",
        "work_mem=4MB"
      ]
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ims-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  mongodb:
    image: mongo:6
    container_name: ims-mongodb
    environment:
      MONGO_INITDB_DB: ims
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ims-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: ims-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ims-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ims-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ims-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  rabbitmq_data:

networks:
  ims-network:
    driver: bridge